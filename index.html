<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Starfighter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Starfighter vertical shooter" role="img"></canvas>
      <section class="touch-hints" aria-hidden="true">

      </section>
    </main>
    <noscript class="noscript">Starfighter requires JavaScript to run.</noscript>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
